<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimoni — WALZSHOP</title>
    <link rel="stylesheet" href="testimoni.css">
    <link rel="stylesheet" href="loader.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOADER -->
<div id="loader-wrapper">
    <div class="loader-brand">WALZSHOP</div>
    <div class="loader"></div>
    <div class="loader-dots">
        <span></span><span></span><span></span>
    </div>
</div>

<!-- Back -->
<a href="index.html" class="back-btn" title="Kembali">
    <i class="fa-solid fa-arrow-left"></i>
</a>

<div class="container">

    <header class="header">
        <div class="header-icon">⭐</div>
        <h1>Testimoni WalzShop</h1>
        <p class="header-sub">Ribuan pelanggan sudah puas dengan layanan kami 💬</p>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-num">500+</div>
                <div class="stat-lbl">Pelanggan</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">4.9★</div>
                <div class="stat-lbl">Rating</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">100%</div>
                <div class="stat-lbl">Trusted</div>
            </div>
        </div>
    </header>

    <div id="testimoni-grid" class="testimoni-grid"></div>
    <div id="pagination-controls" class="pagination-controls"></div>

</div>

<script src="testimoni.js"></script>
</body>
</html>
